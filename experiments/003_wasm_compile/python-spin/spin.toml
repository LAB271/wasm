spin_manifest_version = 2

[application]
name = "hello-py"
version = "0.1.0"
description = "Hello World JSON API in Python (compiled to WASM)"

[[trigger.http]]
route = "/..."
component = "hello-py"

[component.hello-py]
source = "app.wasm"
allowed_outbound_hosts = []

[component.hello-py.build]
command = "componentize-py -d wit -w proxy componentize app -o app.wasm"
watch = ["app.py"]
